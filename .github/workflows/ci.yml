name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      fix:
        description: 'Run auto-format and auto-fix, then submit a PR'
        required: true
        type: boolean
        default: false

jobs:
  test:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fix) }}
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          zypper install -y cmake gcc-c++ make qtkeychain-qt6-devel cppcheck clang-tools kf6-kxmlgui-devel kf6-ki18n-devel kf6-kcoreaddons-devel kf6-kconfig-devel kf6-kconfigwidgets-devel

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: |
          cd build
          QT_QPA_PLATFORM=offscreen ctest --output-on-failure

  vet:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fix) }}
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          zypper install -y cppcheck

      - name: Run cppcheck
        run: cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unknownMacro --suppress=unmatchedSuppression -I src/ src/ -Dslots= -Dsignals=protected -DQ_SIGNALS=protected -DQ_SLOTS= -DQ_OBJECT= -DQ_DECLARE_METATYPE\(x\)= -Demit= -DQ_PLUGIN_METADATA\(x\)=

  format:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fix) }}
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          zypper install -y clang-tools git

      - name: Run clang-format check
        run: find src -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs -r clang-format --Werror --dry-run

  lint:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.fix) }}
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-tidy and dependencies
        run: |
          zypper install -y cmake gcc-c++ make clang-tools git qtkeychain-qt6-devel kf6-kxmlgui-devel kf6-ki18n-devel kf6-kcoreaddons-devel kf6-kconfig-devel kf6-kconfigwidgets-devel

      - name: Configure CMake for compile_commands.json
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: find src -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs -r clang-tidy -p build/

  release:
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    needs: [test, vet, format, lint]
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          zypper install -y cmake gcc-c++ make qtkeychain-qt6-devel kf6-kxmlgui-devel kf6-ki18n-devel kf6-kcoreaddons-devel kf6-kconfig-devel kf6-kconfigwidgets-devel

      - name: Configure CMake
        run: cmake -B build

      - name: Build release
        run: cmake --build build --config Release -j$(nproc)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/KMagMux
          draft: false
          prerelease: false

  fix:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.fix }}
    runs-on: ubuntu-latest
    container: invent-registry.kde.org/sysadmin/ci-images/suse-qt610:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install formatting and linting tools
        run: |
          zypper install -y cmake gcc-c++ make clang-tools git qtkeychain-qt6-devel kf6-kxmlgui-devel kf6-ki18n-devel kf6-kcoreaddons-devel kf6-kconfig-devel kf6-kconfigwidgets-devel

      - name: Configure CMake
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Auto-format code
        run: find src -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs -r clang-format -i

      - name: Auto-fix linting issues
        run: find src -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | xargs -r clang-tidy -p build/ --fix-errors || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-format and fix linting issues"
          title: "Automated format and lint fixes"
          body: "Automated changes applied by clang-format and clang-tidy."
          branch: "chore/auto-fixes-${{ github.run_id }}"
          base: ${{ github.ref_name }}
